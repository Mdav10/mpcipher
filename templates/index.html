<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MPC_CIPHER TERMINAL | Military Grade Encryption</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Courier New', 'Consolas', monospace;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* Matrix Rain Effect */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
            pointer-events: none;
        }

        /* Main Container */
        .cyber-container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #00ff00;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #00ff00;
            margin-bottom: 20px;
            color: #00ff00;
            font-size: 12px;
        }

        .led {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff00;
            border-radius: 50%;
            animation: blink 1s infinite;
            margin-right: 8px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Terminals Layout */
        .terminals-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .terminal {
            background: #0a0a0a;
            border: 1px solid #00ff00;
            border-radius: 10px;
            overflow: hidden;
        }

        .terminal-header {
            background: #001a00;
            padding: 10px;
            border-bottom: 1px solid #00ff00;
            color: #00ff00;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 400px;
            background: #000000;
            color: #00ff00;
            border: none;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            resize: vertical;
            outline: none;
        }

        /* Controls */
        .controls {
            background: #0a0a0a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #00ff00;
        }

        .shift-control {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        input[type="range"] {
            flex: 1;
            background: #00ff00;
            height: 2px;
        }

        button {
            background: #001a00;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 20px;
            font-family: monospace;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #00ff00;
            color: #000000;
            box-shadow: 0 0 10px #00ff00;
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* History Panel */
        .history-panel {
            background: #0a0a0a;
            border: 1px solid #00ff00;
            border-radius: 10px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            color: #00ff00;
            font-size: 12px;
            padding: 5px;
            border-bottom: 1px solid #00ff0022;
        }

        @media (max-width: 768px) {
            .terminals-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    
    <div class="cyber-container">
        <div class="status-bar">
            <div><span class="led"></span> MPC_CIPHER_TERMINAL v1.0</div>
            <div>🟢 SYSTEM ACTIVE</div>
            <div>📡 ENCRYPTION READY</div>
        </div>

        <div class="terminals-grid">
            <div class="terminal">
                <div class="terminal-header">📝 PLAIN TEXT INPUT [ENGLISH]</div>
                <textarea id="plainText" placeholder="Type your secret message here...&#10;&#10;Example: Attack at dawn"></textarea>
            </div>
            <div class="terminal">
                <div class="terminal-header">🔐 CIPHER OUTPUT [CAESAR]</div>
                <textarea id="cipherText" readonly placeholder="Encrypted text appears here..."></textarea>
            </div>
        </div>

        <div class="controls">
            <div class="shift-control">
                <span>⚙️ SHIFT VALUE: </span>
                <input type="range" id="shiftSlider" min="1" max="25" value="3">
                <span id="shiftValue">3</span>
                <button id="randomShift">🎲 RANDOM</button>
            </div>
            
            <div class="mode-toggle">
                <button id="encryptMode">🔒 ENCRYPT MODE</button>
                <button id="decryptMode">🔓 DECRYPT MODE</button>
                <button id="copyBtn">📋 COPY CIPHER</button>
                <button id="clearBtn">🗑️ CLEAR ALL</button>
                <button id="fullscreenBtn">🖥️ FULLSCREEN</button>
            </div>
        </div>

        <div class="history-panel">
            <div>📜 MESSAGE HISTORY LOG</div>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const chars = '01アイウエオカキクケコ0123456789';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = [];
        
        for(let i = 0; i < columns; i++) {
            drops[i] = 1;
        }
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';
            
            for(let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        
        setInterval(drawMatrix, 50);
        
        let currentMode = 'encrypt';
        
        function caesarEncrypt(text, shift) {
            if(!text) return '';
            shift = shift % 26;
            if(currentMode === 'decrypt') shift = -shift;
            
            return text.replace(/[a-zA-Z]/g, (char) => {
                const base = char <= 'Z' ? 65 : 97;
                return String.fromCharCode(((char.charCodeAt(0) - base + shift) % 26 + 26) % 26 + base);
            });
        }
        
        const plainText = document.getElementById('plainText');
        const cipherText = document.getElementById('cipherText');
        const shiftSlider = document.getElementById('shiftSlider');
        const shiftValue = document.getElementById('shiftValue');
        
        function updateCipher() {
            const text = plainText.value;
            const shift = parseInt(shiftSlider.value);
            const encrypted = caesarEncrypt(text, shift);
            cipherText.value = encrypted;
            
            if(text.trim()) {
                addToHistory(text, encrypted, shift);
            }
        }
        
        function addToHistory(plain, cipher, shift) {
            const historyDiv = document.getElementById('historyList');
            const time = new Date().toLocaleTimeString();
            const modeSymbol = currentMode === 'encrypt' ? '🔒' : '🔓';
            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            historyItem.innerHTML = `[${time}] ${modeSymbol} Shift:${shift} | "${plain.substring(0, 40)}" → "${cipher.substring(0, 40)}"`;
            historyDiv.insertBefore(historyItem, historyDiv.firstChild);
            
            while(historyDiv.children.length > 20) {
                historyDiv.removeChild(historyDiv.lastChild);
            }
        }
        
        plainText.addEventListener('input', updateCipher);
        shiftSlider.addEventListener('input', (e) => {
            shiftValue.textContent = e.target.value;
            updateCipher();
        });
        
        document.getElementById('randomShift').addEventListener('click', () => {
            const random = Math.floor(Math.random() * 25) + 1;
            shiftSlider.value = random;
            shiftValue.textContent = random;
            updateCipher();
        });
        
        document.getElementById('encryptMode').addEventListener('click', () => {
            currentMode = 'encrypt';
            updateCipher();
        });
        
        document.getElementById('decryptMode').addEventListener('click', () => {
            currentMode = 'decrypt';
            updateCipher();
        });
        
        document.getElementById('copyBtn').addEventListener('click', () => {
            cipherText.select();
            document.execCommand('copy');
            alert('📋 Cipher copied to clipboard!');
        });
        
        document.getElementById('clearBtn').addEventListener('click', () => {
            plainText.value = '';
            cipherText.value = '';
            document.getElementById('historyList').innerHTML = '';
        });
        
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if(document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        });
        
        updateCipher();
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
