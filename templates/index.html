<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MPC_CIPHER TERMINAL | Military Grade Encryption</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#000;font-family:'Courier New',Consolas,monospace;overflow-x:hidden;position:relative;min-height:100vh}#matrixCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.15;pointer-events:none}.cyber-container{position:relative;z-index:2;max-width:1400px;margin:20px auto;padding:20px;background:rgba(0,0,0,0.85);border:2px solid #0f0;border-radius:15px;box-shadow:0 0 30px rgba(0,255,0,0.3)}.status-bar{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #0f0;margin-bottom:20px;color:#0f0;font-size:12px;flex-wrap:wrap}.led{display:inline-block;width:10px;height:10px;background:#0f0;border-radius:50%;animation:blink 1s infinite;margin-right:8px}@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}.smart-badge{background:#0f02;border:1px solid #0f0;padding:5px 10px;border-radius:5px;font-size:11px}.terminals-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}.terminal{background:#0a0a0a;border:1px solid #0f0;border-radius:10px;overflow:hidden}.terminal-header{background:#001a00;padding:10px;border-bottom:1px solid #0f0;color:#0f0;font-weight:bold;display:flex;justify-content:space-between}.swap-btn{background:0 0;border:1px solid #0f0;color:#0f0;padding:2px 8px;cursor:pointer;font-size:11px;border-radius:3px}.swap-btn:hover{background:#0f0;color:#000}textarea{width:100%;height:400px;background:#000;color:#0f0;border:none;padding:15px;font-family:'Courier New',monospace;font-size:16px;resize:vertical;outline:0}.controls{background:#0a0a0a;padding:20px;border-radius:10px;margin-bottom:20px;border:1px solid #0f0}.shift-control{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:15px}input[type=range]{flex:1;background:#0f0;height:2px;-webkit-appearance:none}input[type=range]:focus{outline:0}input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;background:#0f0;border-radius:50%;cursor:pointer}button{background:#001a00;color:#0f0;border:1px solid #0f0;padding:10px 20px;font-family:monospace;cursor:pointer;transition:all .3s}button:hover{background:#0f0;color:#000;box-shadow:0 0 10px #0f0}.mode-toggle{display:flex;gap:10px;flex-wrap:wrap}.active-mode{background:#0f0;color:#000;box-shadow:0 0 15px #0f0}.history-panel{background:#0a0a0a;border:1px solid #0f0;border-radius:10px;padding:15px;max-height:200px;overflow-y:auto}.history-item{color:#0f0;font-size:12px;padding:5px;border-bottom:1px solid #0f02;font-family:monospace}@media(max-width:768px){.terminals-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>
<div class="cyber-container">
<div class="status-bar">
<div>🔴 MPC_CIPHER_TERMINAL v2.0</div>
<div>🟢 SYSTEM ACTIVE</div>
<div class="smart-badge">🤖 SMART MODE: ON</div>
<div>📡 BIDIRECTIONAL</div>
</div>
<div class="terminals-grid">
<div class="terminal">
<div class="terminal-header">
<span>📝 TERMINAL A</span>
<button class="swap-btn" id="swapBtn">🔄 SWAP</button>
</div>
<textarea id="textA" placeholder="Type or paste ANY text here...&#10;&#10;English → Will encrypt to Cipher&#10;Cipher → Will decrypt to English&#10;&#10;Example: Attack at dawn OR Dwwdfn dw gdzq"></textarea>
</div>
<div class="terminal">
<div class="terminal-header">
<span>🔐 TERMINAL B</span>
<span id="modeIndicator">⚡ AUTO CONVERT</span>
</div>
<textarea id="textB" readonly placeholder="Converted text appears here..."></textarea>
</div>
</div>
<div class="controls">
<div class="shift-control">
<span>⚙️ SHIFT VALUE: </span>
<input type="range" id="shiftSlider" min="1" max="25" value="3">
<span id="shiftValue">3</span>
<button id="randomShift">🎲 RANDOM</button>
<button id="autoDetectBtn" class="active-mode">🤖 AUTO DETECT</button>
<button id="manualEncryptBtn">🔒 FORCE ENCRYPT</button>
<button id="manualDecryptBtn">🔓 FORCE DECRYPT</button>
</div>
<div class="mode-toggle">
<button id="copyBtn">📋 COPY OUTPUT</button>
<button id="clearBtn">🗑️ CLEAR ALL</button>
<button id="fullscreenBtn">🖥️ FULLSCREEN</button>
</div>
</div>
<div class="history-panel">
<div>📜 CONVERSION HISTORY</div>
<div id="historyList"></div>
</div>
</div>
<script>
const canvas=document.getElementById('matrixCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const chars='01アイウエオカキクケコ0123456789#@%&';const fontSize=14;const columns=canvas.width/fontSize;const drops=[];for(let i=0;i<columns;i++){drops[i]=1;}
function drawMatrix(){ctx.fillStyle='rgba(0, 0, 0, 0.04)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#0f0';ctx.font=fontSize+'px monospace';for(let i=0;i<drops.length;i++){const text=chars[Math.floor(Math.random()*chars.length)];ctx.fillText(text,i*fontSize,drops[i]*fontSize);if(drops[i]*fontSize>canvas.height&&Math.random()>0.975){drops[i]=0;}
drops[i]++;}}
setInterval(drawMatrix,50);
function caesarTransform(text,shift,mode){if(!text)return '';shift=shift%26;if(mode==='decrypt')shift=-shift;return text.replace(/[a-zA-Z]/g,(char)=>{const base=char<='Z'?65:97;return String.fromCharCode(((char.charCodeAt(0)-base+shift)%26+26)%26+base);});}
function isLikelyCipher(text,shift){if(!text||text.length<3)return false;const commonWords=['the','and','for','you','are','this','that','have'];const words=text.toLowerCase().split(/\s+/);let englishScore=0;for(let word of words){if(commonWords.includes(word))englishScore++;}
if(englishScore>0)return false;const upperRatio=(text.match(/[A-Z]/g)||[]).length/text.length;const letterRatio=(text.match(/[a-zA-Z]/g)||[]).length/text.length;return(upperRatio>0.3&&letterRatio>0.7)||text.length>10;}
let currentMode='auto';let textA=document.getElementById('textA');let textB=document.getElementById('textB');let shiftSlider=document.getElementById('shiftSlider');let shiftValue=document.getElementById('shiftValue');
function updateConversion(){const inputText=textA.value;const shift=parseInt(shiftSlider.value);let outputText='';let usedMode=currentMode;if(currentMode==='auto'){const looksLikeCipher=isLikelyCipher(inputText,shift);const testDecrypt=caesarTransform(inputText,shift,'decrypt');const decryptHasSpaces=(testDecrypt.match(/[a-zA-Z]\s+[a-zA-Z]/)||[]).length>0;const decryptHasCommon=['the','and','for','you'].some(word=>testDecrypt.toLowerCase().includes(word));if((looksLikeCipher||decryptHasSpaces||decryptHasCommon)&&inputText.length>2){outputText=testDecrypt;usedMode='decrypt';document.getElementById('modeIndicator').innerHTML='🔓 AUTO-DECRYPT';}else{outputText=caesarTransform(inputText,shift,'encrypt');usedMode='encrypt';document.getElementById('modeIndicator').innerHTML='🔒 AUTO-ENCRYPT';}}else if(currentMode==='encrypt'){outputText=caesarTransform(inputText,shift,'encrypt');document.getElementById('modeIndicator').innerHTML='🔒 FORCE ENCRYPT';}else{outputText=caesarTransform(inputText,shift,'decrypt');document.getElementById('modeIndicator').innerHTML='🔓 FORCE DECRYPT';}
textB.value=outputText;if(inputText.trim()&&outputText.trim()){addToHistory(inputText,outputText,shift,usedMode);}}
function addToHistory(input,output,shift,mode){const historyDiv=document.getElementById('historyList');const time=new Date().toLocaleTimeString();const modeIcon=mode==='encrypt'?'🔒 ENC':(mode==='decrypt'?'🔓 DEC':'🤖 AUTO');const arrow=mode==='encrypt'?'→':'←';const historyItem=document.createElement('div');historyItem.className='history-item';historyItem.innerHTML=`[${time}] ${modeIcon} Shift:${shift} | "${input.substring(0,35)}" ${arrow} "${output.substring(0,35)}"`;historyDiv.insertBefore(historyItem,historyDiv.firstChild);while(historyDiv.children.length>30){historyDiv.removeChild(historyDiv.lastChild);}}
textA.addEventListener('input',updateConversion);shiftSlider.addEventListener('input',(e)=>{shiftValue.textContent=e.target.value;updateConversion();});
document.getElementById('randomShift').addEventListener('click',()=>{const random=Math.floor(Math.random()*25)+1;shiftSlider.value=random;shiftValue.textContent=random;updateConversion();});
document.getElementById('autoDetectBtn').addEventListener('click',()=>{currentMode='auto';document.getElementById('autoDetectBtn').classList.add('active-mode');document.getElementById('manualEncryptBtn').classList.remove('active-mode');document.getElementById('manualDecryptBtn').classList.remove('active-mode');updateConversion();});
document.getElementById('manualEncryptBtn').addEventListener('click',()=>{currentMode='encrypt';document.getElementById('manualEncryptBtn').classList.add('active-mode');document.getElementById('autoDetectBtn').classList.remove('active-mode');document.getElementById('manualDecryptBtn').classList.remove('active-mode');updateConversion();});
document.getElementById('manualDecryptBtn').addEventListener('click',()=>{currentMode='decrypt';document.getElementById('manualDecryptBtn').classList.add('active-mode');document.getElementById('autoDetectBtn').classList.remove('active-mode');document.getElementById('manualEncryptBtn').classList.remove('active-mode');updateConversion();});
document.getElementById('swapBtn').addEventListener('click',()=>{const temp=textA.value;textA.value=textB.value;textB.value=temp;updateConversion();});
document.getElementById('copyBtn').addEventListener('click',()=>{textB.select();document.execCommand('copy');alert('📋 Output copied to clipboard!');});
document.getElementById('clearBtn').addEventListener('click',()=>{textA.value='';textB.value='';document.getElementById('historyList').innerHTML='';updateConversion();});
document.getElementById('fullscreenBtn').addEventListener('click',()=>{if(document.documentElement.requestFullscreen){document.documentElement.requestFullscreen();}});
updateConversion();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
setTimeout(()=>{if(textA.value===''){textA.placeholder='Try these examples:\n\nEnglish: "Attack at dawn"\nCipher: "Dwwdfn dw gdzq"\n\nPaste either one and watch magic happen!';}},1000);
</script>
</body>
</html>
